<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">TinyMathReason-1B</title>
  <desc id="desc">1.12B-parameter mathematical reasoning model trained from scratch.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0c1428"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="400" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" rx="16" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="16" fill="url(#grid)"/>
  <rect x="1" y="1" width="1278" height="358" rx="15" fill="none" stroke="url(#border)" stroke-width="1.25"/>

  <!-- =========================================================
       LEFT GRAPH  —  hard clip: nothing leaves x=0..300
       ========================================================= -->
  <g clip-path="none">
    <!-- edges: only between node columns at x=70, 155, 240 -->
    <g fill="none" stroke-linecap="round" stroke-width="1.35" opacity="0.9">
      <path d="M70 120 C105 112, 125 125, 155 128" stroke="#22d3ee"/>
      <path d="M70 185 C105 175, 125 188, 155 190" stroke="#818cf8"/>
      <path d="M105 78 C125 95, 140 115, 155 128" stroke="#34d399"/>
      <path d="M115 245 C135 215, 145 200, 155 190" stroke="#f59e0b"/>
      <path d="M155 128 C185 122, 210 130, 240 135" stroke="#22d3ee"/>
      <path d="M155 190 C185 184, 210 192, 240 195" stroke="#a78bfa"/>
      <path d="M155 128 C185 150, 210 170, 240 195" stroke="#6366f1" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
      <path d="M155 190 C185 168, 210 150, 240 135" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>
    </g>

    <!-- nodes -->
    <g font-family="Georgia, 'Times New Roman', Times, serif" font-weight="600" text-anchor="middle">
      <!-- col 1 -->
      <circle cx="70" cy="120" r="16" fill="#0a1020" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="70" y="125" font-size="14" fill="#67e8f9">π</text>

      <circle cx="70" cy="185" r="14" fill="#0a1020" stroke="#818cf8" stroke-width="1.4"/>
      <text x="70" y="190" font-size="13" fill="#c4b5fd">∑</text>

      <circle cx="105" cy="78" r="12" fill="#0a1020" stroke="#34d399" stroke-width="1.3"/>
      <text x="105" y="83" font-size="12" fill="#6ee7b7">√</text>

      <circle cx="115" cy="245" r="13" fill="#0a1020" stroke="#f59e0b" stroke-width="1.3"/>
      <text x="115" y="250" font-size="12" fill="#fcd34d">∂</text>

      <!-- col 2 -->
      <circle cx="155" cy="128" r="17" fill="#0a1020" stroke="#22d3ee" stroke-width="1.55"/>
      <text x="155" y="134" font-size="15" fill="#a5f3fc">∫</text>

      <circle cx="155" cy="190" r="15" fill="#0a1020" stroke="#a78bfa" stroke-width="1.45"/>
      <text x="155" y="195" font-size="14" fill="#ddd6fe">∞</text>

      <!-- col 3 — last column; ends well before title -->
      <circle cx="240" cy="135" r="14" fill="#0a1020" stroke="#fbbf24" stroke-width="1.4"/>
      <text x="240" y="140" font-size="12" fill="#fde68a">eˣ</text>

      <circle cx="240" cy="195" r="13" fill="#0a1020" stroke="#34d399" stroke-width="1.3"/>
      <text x="240" y="200" font-size="12" fill="#a7f3d0">x²</text>
    </g>

    <!-- floating labels (left zone only) -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#64748b" opacity="0.5">
      <text x="36" y="42">3x+7=22</text>
      <text x="170" y="52">∀ε&gt;0</text>
      <text x="36" y="278">aₙ→L</text>
      <text x="175" y="268">P(A|B)</text>
    </g>
  </g>

  <!-- =========================================================
       CENTER  —  x: 320..900   (clear of graph & right panel)
       ========================================================= -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">

    <!-- eyebrow pill -->
    <rect x="455" y="36" width="370" height="26" rx="13" fill="#0c4a6e" fill-opacity="0.35" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1"/>
    <text x="640" y="53" font-size="11" font-weight="600" letter-spacing="2.5" fill="#67e8f9">FROM SCRATCH · MATH REASONING</text>

    <!-- title -->
    <text x="640" y="108" font-size="42" font-weight="800" letter-spacing="-0.5" fill="url(#titleGrad)">TinyMathReason-1B</text>

    <!-- subtitle — full width of center, no nodes nearby -->
    <text x="640" y="138" font-size="13" fill="#94a3b8">1.12B-parameter decoder trained end-to-end for mathematical reasoning</text>

    <!-- think box: three dedicated rows, opaque so nothing shows through -->
    <rect x="420" y="158" width="440" height="78" rx="12" fill="#080e1c" stroke="#334155" stroke-width="1"/>
    <rect x="420" y="158" width="4" height="78" rx="2" fill="#22d3ee"/>

    <text x="640" y="182" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#22d3ee">&lt;think&gt;</text>
    <text x="640" y="204" font-size="13" font-weight="500" fill="#e2e8f0">data → tokenizer → TPU pretrain → SFT → GRPO → eval</text>
    <text x="640" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#a78bfa">&lt;/think&gt;</text>
  </g>

  <!-- =========================================================
       RIGHT PANEL  —  x: 980..1240
       ========================================================= -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- stacked cards -->
    <rect x="1024" y="40" width="150" height="42" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
    <rect x="1014" y="56" width="150" height="42" rx="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1" opacity="0.55"/>
    <rect x="1004" y="72" width="150" height="48" rx="8" fill="#0a1020" stroke="#67e8f9" stroke-width="1.35"/>
    <text x="1079" y="93" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1" fill="#67e8f9">TRANSFORMER × 22</text>
    <text x="1079" y="108" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#94a3b8">GQA 16Q · 4KV</text>

    <!-- metric pills — side by side with gap -->
    <rect x="1004" y="138" width="70" height="28" rx="8" fill="#0c1e33" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="1039" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#e0f2fe">1.12B</text>

    <rect x="1084" y="138" width="70" height="28" rx="8" fill="#1a1433" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="1119" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#e9d5ff">32k BPE</text>

    <rect x="1004" y="178" width="150" height="28" rx="8" fill="#0a1020" stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="1079" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#fcd34d">~57B tokens · $0 compute</text>
  </g>

  <!-- =========================================================
       BOTTOM RAIL  —  y ≥ 280, clear of all content above
       ========================================================= -->
  <line x1="48" y1="292" x2="1232" y2="292" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="292" x2="1232" y2="292" stroke="#22d3ee" stroke-width="1.5" opacity="0.25"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="0.7" text-anchor="middle">
    <circle cx="90" cy="292" r="5" fill="#22d3ee"/>
    <text x="90" y="318" fill="#7dd3fc">TOKENIZER</text>

    <circle cx="270" cy="292" r="5" fill="#34d399"/>
    <text x="270" y="318" fill="#6ee7b7">DATA · 57B</text>

    <circle cx="450" cy="292" r="5" fill="#818cf8"/>
    <text x="450" y="318" fill="#c4b5fd">PRETRAIN TPU</text>

    <circle cx="630" cy="292" r="5" fill="#a78bfa"/>
    <text x="630" y="318" fill="#ddd6fe">CONVERT</text>

    <circle cx="810" cy="292" r="5" fill="#f59e0b"/>
    <text x="810" y="318" fill="#fcd34d">SFT</text>

    <circle cx="990" cy="292" r="5" fill="#fb7185"/>
    <text x="990" y="318" fill="#fda4af">GRPO</text>

    <circle cx="1170" cy="292" r="6" fill="#fbbf24"/>
    <text x="1170" y="318" fill="#fde68a">EVAL</text>
  </g>
</svg>
