<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">TinyMathReason-1B</title>
  <desc id="desc">A 1.12B-parameter model trained from scratch for mathematical reasoning.</desc>

  <defs>
    <pattern id="paperGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1c1917" stroke-width="0.5" opacity="0.045"/>
    </pattern>
  </defs>

  <!-- Paper field -->
  <rect width="1200" height="280" fill="#F3EFE6"/>
  <rect width="1200" height="280" fill="url(#paperGrid)"/>

  <!-- Outer frame: letterpress margin -->
  <rect x="16" y="16" width="1168" height="248" fill="none" stroke="#1c1917" stroke-width="1.25"/>
  <rect x="22" y="22" width="1156" height="236" fill="none" stroke="#1c1917" stroke-width="0.4" opacity="0.35"/>

  <!-- Left mark: proof tree / branching reasoning (flat, intentional geometry) -->
  <g transform="translate(72, 56)" fill="none" stroke="#1c1917" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Root -->
    <circle cx="96" cy="24" r="7" fill="#1c1917" stroke="none"/>
    <!-- Branches -->
    <path d="M96 31 V58"/>
    <path d="M96 58 H48"/>
    <path d="M96 58 H144"/>
    <path d="M48 58 V88"/>
    <path d="M144 58 V88"/>
    <!-- Mid nodes -->
    <circle cx="48" cy="95" r="6" fill="#C2410C" stroke="none"/>
    <circle cx="144" cy="95" r="6" fill="#1c1917" stroke="none"/>
    <!-- Second fork from left -->
    <path d="M48 101 V124"/>
    <path d="M48 124 H20"/>
    <path d="M48 124 H76"/>
    <path d="M20 124 V148"/>
    <path d="M76 124 V148"/>
    <!-- Right continues -->
    <path d="M144 101 V148"/>
    <!-- Leaves -->
    <rect x="14" y="148" width="12" height="12" fill="#1c1917" stroke="none"/>
    <rect x="70" y="148" width="12" height="12" fill="none" stroke="#1c1917" stroke-width="1.5"/>
    <rect x="138" y="148" width="12" height="12" fill="#C2410C" stroke="none"/>

    <!-- Small annotation ticks (like a derivation) -->
    <g stroke-width="1" opacity="0.45">
      <path d="M110 24 H128"/>
      <path d="M158 95 H176"/>
      <path d="M158 154 H176"/>
    </g>
  </g>

  <!-- Thin vertical rule separating mark and type -->
  <line x1="320" y1="48" x2="320" y2="232" stroke="#1c1917" stroke-width="1" opacity="0.2"/>

  <!-- Typography block -->
  <g font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif" fill="#1c1917">
    <!-- Eyebrow -->
    <text x="360" y="78" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="3.2" fill="#78716c">FROM SCRATCH</text>

    <!-- Title -->
    <text x="360" y="128" font-size="42" font-weight="700" letter-spacing="-0.8">TinyMathReason</text>
    <!-- Weight numeral as design element -->
    <text x="360" y="178" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="300" letter-spacing="-2" fill="#C2410C">1B</text>
  </g>

  <!-- Right column: quiet facts -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#44403c" transform="translate(560, 148)">
    <text x="0" y="0" font-size="13" font-weight="500">mathematical reasoning model</text>
    <text x="0" y="24" font-size="12" fill="#78716c">1.12B params · 57B tokens · full pipeline</text>
    <text x="0" y="48" font-size="12" fill="#78716c">tokenizer → pretrain → SFT → GRPO → eval</text>
  </g>

  <!-- Bottom meta strip -->
  <line x1="48" y1="228" x2="1152" y2="228" stroke="#1c1917" stroke-width="0.75" opacity="0.25"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" letter-spacing="1.6" fill="#78716c">
    <text x="48" y="250">LLAMA-STYLE DECODER</text>
    <text x="280" y="250">GQA 16Q / 4KV</text>
    <text x="460" y="250">TPU v4-64</text>
    <text x="600" y="250">AMD MI300X</text>
    <text x="760" y="250">OPEN ARTIFACT</text>
  </g>

  <!-- Corner registration marks (print-design nod, not decoration overload) -->
  <g stroke="#1c1917" stroke-width="1" fill="none" opacity="0.4">
    <path d="M40 40 H52 M40 40 V52"/>
    <path d="M1160 40 H1148 M1160 40 V52"/>
    <path d="M40 240 H52 M40 240 V228"/>
    <path d="M1160 240 H1148 M1160 240 V228"/>
  </g>
</svg>
