<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">TinyMathReason-1B</title>
  <desc id="desc">Header artwork for a 1.12B-parameter mathematical reasoning model trained from scratch — neural network layers, math symbols, and chain-of-thought reasoning.</desc>
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b16"/>
      <stop offset="45%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#10182e"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="78%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="18%" cy="70%" r="28%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- Accents -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="40%" stop-color="#a5f3fc"/>
      <stop offset="70%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="edgeCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#164e63" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Soft node glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Graph-paper clip -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-width="0.6" opacity="0.07"/>
    </pattern>
    <pattern id="gridFine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0H0V8" fill="none" stroke="#94a3b8" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Dot texture -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.8" fill="#e2e8f0" opacity="0.06"/>
    </pattern>

    <!-- Mask for vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="20" fill="url(#gridFine)"/>
  <rect width="1280" height="360" rx="20" fill="url(#grid)"/>
  <rect width="1280" height="360" rx="20" fill="url(#dots)"/>
  <rect width="1280" height="360" rx="20" fill="url(#glowCenter)"/>
  <rect width="1280" height="360" rx="20" fill="url(#glowAmber)"/>
  <rect width="1280" height="360" rx="20" fill="url(#glowMint)"/>

  <!-- Decorative border -->
  <rect x="1.5" y="1.5" width="1277" height="357" rx="18.5" fill="none" stroke="url(#frameGrad)" stroke-width="1.5" opacity="0.7"/>
  <rect x="10" y="10" width="1260" height="340" rx="14" fill="none" stroke="#64748b" stroke-width="0.6" opacity="0.25"/>

  <!-- ========== LEFT: Math constellation / neural field ========== -->
  <g opacity="0.95">
    <!-- Attention edges (background) -->
    <g stroke-linecap="round" fill="none">
      <path d="M90 120 C140 100, 180 160, 230 140" stroke="url(#edgeCyan)" stroke-width="1.4"/>
      <path d="M95 200 C150 180, 170 240, 235 210" stroke="url(#edgeCyan)" stroke-width="1.2"/>
      <path d="M230 140 C280 120, 300 180, 350 160" stroke="url(#edgeAmber)" stroke-width="1.3"/>
      <path d="M235 210 C290 190, 310 250, 355 220" stroke="url(#edgeCyan)" stroke-width="1.1"/>
      <path d="M140 80 C190 90, 200 130, 230 140" stroke="#818cf8" stroke-width="1" opacity="0.45"/>
      <path d="M160 280 C210 250, 220 220, 235 210" stroke="#34d399" stroke-width="1" opacity="0.4"/>
      <path d="M350 160 C400 145, 420 200, 460 185" stroke="url(#edgeCyan)" stroke-width="1.2"/>
      <path d="M355 220 C410 200, 430 250, 465 235" stroke="url(#edgeAmber)" stroke-width="1.1"/>
      <!-- Cross attention -->
      <path d="M230 140 C280 180, 300 180, 355 220" stroke="#a78bfa" stroke-width="0.9" opacity="0.35" stroke-dasharray="3 4"/>
      <path d="M235 210 C280 170, 300 160, 350 160" stroke="#22d3ee" stroke-width="0.9" opacity="0.3" stroke-dasharray="3 4"/>
    </g>

    <!-- Neural nodes with math glyphs -->
    <!-- Layer 1 -->
    <g filter="url(#softGlow)">
      <circle cx="90" cy="120" r="18" fill="#0f172a" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="90" y="125" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="15" fill="#67e8f9" font-weight="600">π</text>

      <circle cx="95" cy="200" r="16" fill="#0f172a" stroke="#818cf8" stroke-width="1.3"/>
      <text x="95" y="205" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="14" fill="#c4b5fd" font-weight="600">∑</text>

      <circle cx="140" cy="80" r="14" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
      <text x="140" y="85" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="13" fill="#6ee7b7" font-weight="600">√</text>

      <circle cx="160" cy="280" r="15" fill="#0f172a" stroke="#f59e0b" stroke-width="1.2"/>
      <text x="160" y="285" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="14" fill="#fcd34d" font-weight="600">∂</text>
    </g>

    <!-- Layer 2 (hidden / transformer) -->
    <g filter="url(#softGlow)">
      <circle cx="230" cy="140" r="20" fill="#111827" stroke="#22d3ee" stroke-width="1.6"/>
      <text x="230" y="146" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="16" fill="#a5f3fc" font-weight="700">∫</text>

      <circle cx="235" cy="210" r="18" fill="#111827" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="235" y="215" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="15" fill="#ddd6fe" font-weight="700">∞</text>
    </g>

    <!-- Layer 3 -->
    <g filter="url(#softGlow)">
      <circle cx="350" cy="160" r="17" fill="#0f172a" stroke="#fbbf24" stroke-width="1.4"/>
      <text x="350" y="165" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="14" fill="#fde68a" font-weight="700">eˣ</text>

      <circle cx="355" cy="220" r="15" fill="#0f172a" stroke="#34d399" stroke-width="1.3"/>
      <text x="355" y="225" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="13" fill="#a7f3d0" font-weight="600">x²</text>

      <circle cx="460" cy="185" r="16" fill="#0f172a" stroke="#22d3ee" stroke-width="1.3"/>
      <text x="460" y="190" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="13" fill="#67e8f9" font-weight="600">θ</text>

      <circle cx="465" cy="235" r="13" fill="#0f172a" stroke="#c084fc" stroke-width="1.2"/>
      <text x="465" y="239" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="12" fill="#e9d5ff" font-weight="600">∇</text>
    </g>

    <!-- Tiny floating equation chips -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#94a3b8" opacity="0.55">
      <text x="70" y="50">3x+7=22</text>
      <text x="280" y="70">∀ε&gt;0</text>
      <text x="400" y="100">f′(x)</text>
      <text x="60" y="320">aₙ→L</text>
      <text x="300" y="300">P(A|B)</text>
    </g>
  </g>

  <!-- ========== CENTER: Brand + concept ========== -->
  <g text-anchor="middle">
    <!-- Small label -->
    <g>
      <rect x="490" y="58" width="300" height="26" rx="13" fill="#0ea5e9" fill-opacity="0.08" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1"/>
      <text x="640" y="75" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" letter-spacing="2.2" fill="#67e8f9" font-weight="600">FROM SCRATCH · MATH REASONING</text>
    </g>

    <!-- Main title -->
    <text x="640" y="140" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.5" fill="url(#titleGrad)" filter="url(#titleGlow)">TinyMathReason-1B</text>

    <!-- Subtitle -->
    <text x="640" y="178" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" fill="#94a3b8" font-weight="400">1.12B-parameter decoder trained end-to-end for mathematical reasoning</text>

    <!-- Think / chain-of-thought visual -->
    <g>
      <rect x="430" y="200" width="420" height="42" rx="10" fill="#0f172a" fill-opacity="0.75" stroke="#334155" stroke-width="1"/>
      <!-- left accent bar -->
      <rect x="430" y="200" width="4" height="42" rx="2" fill="#22d3ee"/>
      <text x="455" y="218" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#22d3ee">&lt;think&gt;</text>
      <text x="640" y="226" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#cbd5e1">data → tokenizer → TPU pretrain → SFT → GRPO → eval</text>
      <text x="800" y="236" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#a78bfa">&lt;/think&gt;</text>
    </g>
  </g>

  <!-- ========== RIGHT: Compact model / stack metaphor ========== -->
  <g transform="translate(980, 70)">
    <!-- Stacked transformer blocks -->
    <g>
      <!-- Block 3 (back) -->
      <rect x="28" y="8" width="150" height="48" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.55"/>
      <!-- Block 2 -->
      <rect x="18" y="28" width="150" height="48" rx="8" fill="#164e63" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
      <!-- Block 1 (front) -->
      <rect x="8" y="48" width="150" height="52" rx="8" fill="#0f172a" stroke="#67e8f9" stroke-width="1.4"/>
      <text x="83" y="70" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#67e8f9" letter-spacing="1.2" font-weight="600">TRANSFORMER × 22</text>
      <text x="83" y="88" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#94a3b8">GQA 16Q · 4KV</text>
    </g>

    <!-- Mini metric pills -->
    <g font-family="ui-sans-serif, system-ui, sans-serif">
      <rect x="8" y="120" width="70" height="28" rx="8" fill="url(#chipGrad)" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="43" y="138" text-anchor="middle" font-size="12" fill="#e0f2fe" font-weight="700">1.12B</text>

      <rect x="88" y="120" width="70" height="28" rx="8" fill="url(#chipGrad)" stroke="#a78bfa" stroke-opacity="0.3"/>
      <text x="123" y="138" text-anchor="middle" font-size="12" fill="#e9d5ff" font-weight="700">32k BPE</text>

      <rect x="8" y="158" width="150" height="28" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-opacity="0.35"/>
      <text x="83" y="176" text-anchor="middle" font-size="11" fill="#fcd34d" font-weight="600">~57B tokens · $0 compute</text>
    </g>
  </g>

  <!-- ========== Bottom pipeline rail ========== -->
  <g transform="translate(80, 300)">
    <!-- rail -->
    <line x1="0" y1="16" x2="1120" y2="16" stroke="#334155" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="16" x2="1120" y2="16" stroke="url(#edgeCyan)" stroke-width="2" opacity="0.5"/>

    <!-- stages -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="600" letter-spacing="0.6">
      <!-- node + label helper pattern -->
      <g>
        <circle cx="40" cy="16" r="5" fill="#22d3ee"/>
        <text x="40" y="38" text-anchor="middle" fill="#7dd3fc">TOKENIZER</text>
      </g>
      <g>
        <circle cx="220" cy="16" r="5" fill="#34d399"/>
        <text x="220" y="38" text-anchor="middle" fill="#6ee7b7">DATA · 57B</text>
      </g>
      <g>
        <circle cx="400" cy="16" r="5" fill="#818cf8"/>
        <text x="400" y="38" text-anchor="middle" fill="#c4b5fd">PRETRAIN TPU</text>
      </g>
      <g>
        <circle cx="580" cy="16" r="5" fill="#a78bfa"/>
        <text x="580" y="38" text-anchor="middle" fill="#ddd6fe">CONVERT</text>
      </g>
      <g>
        <circle cx="760" cy="16" r="5" fill="#f59e0b"/>
        <text x="760" y="38" text-anchor="middle" fill="#fcd34d">SFT</text>
      </g>
      <g>
        <circle cx="940" cy="16" r="5" fill="#fb7185"/>
        <text x="940" y="38" text-anchor="middle" fill="#fda4af">GRPO</text>
      </g>
      <g>
        <circle cx="1100" cy="16" r="6" fill="#fbbf24" filter="url(#softGlow)"/>
        <text x="1100" y="38" text-anchor="middle" fill="#fde68a">EVAL</text>
      </g>
    </g>
  </g>

  <!-- Corner flourishes: small braces / math brackets -->
  <g fill="none" stroke="#475569" stroke-width="1.2" opacity="0.45">
    <path d="M40 40 C28 40, 28 40, 28 55 L28 90 C28 105, 28 105, 40 105"/>
    <path d="M1240 40 C1252 40, 1252 40, 1252 55 L1252 90 C1252 105, 1252 105, 1240 105"/>
    <path d="M40 255 C28 255, 28 255, 28 270 L28 305 C28 320, 28 320, 40 320"/>
    <path d="M1240 255 C1252 255, 1252 255, 1252 270 L1252 305 C1252 320, 1252 320, 1240 320"/>
  </g>
</svg>
