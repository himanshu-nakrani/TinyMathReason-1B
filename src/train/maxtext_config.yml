# TinyMathReason-1B Pretraining Configuration for MaxText
# ======================================================
# SMOKE TEST: Uses synthetic data to validate TPU hardware,
# distributed sharding, XLA compilation, and checkpointing.
# Switch dataset_type to "hf" for real training (see below).

# Architecture Config Override
# This maps our 1.12B config to MaxText's names
base_config: "base.yml"
model_name: "default"

base_emb_dim: 2048
base_num_query_heads: 16
base_num_kv_heads: 4
base_mlp_dim: 5632
base_num_decoder_layers: 22
head_dim: 128
vocab_size: 32768  # power of 2 for clean FSDP sharding
attention: "dot_product"

# Sequence length
max_target_length: 4096

# Data loading — PRODUCTION uses pre-tokenized HF dataset
dataset_type: "hf"
hf_path: "json"
hf_train_files: "gs://tinymath-reason-data-himanshu/pretraining-data/**/*.jsonl.zst"
tokenize_train_data: False
train_data_columns: ['targets']
tokenizer_path: "gs://tinymath-reason-data-himanshu/tokenizer/tokenizer.tiktoken"
tokenizer_type: "tiktoken"
# The vocabulary is 32000, but we use 32768 for padding/sharding compatibility.

# Optimization
learning_rate: 0.0003
warmup_steps_fraction: 0.0066666
learning_rate_final_fraction: 0.1
opt_type: "adamw"
adam_b1: 0.9
adam_b2: 0.95
adam_eps: 1.0e-8
adam_weight_decay: 0.1
gradient_clipping_threshold: 1.0

# Batching & Scale
per_device_batch_size: 8   # Yields 8 * 32 * 4096 = 1,048,576 tokens per step
steps: 54363               # ~57B tokens total

# Checkpointing (save to GCS)
checkpoint_period: 1000    # Save every 1000 steps
async_checkpointing: True
base_output_directory: "gs://tinymath-reason-data-himanshu/checkpoints"
run_name: "tinymath-1b-prod-run2"

# Hardware / Compilation
dtype: "bfloat16"

# Sharding — relax tolerance for JAX 0.6.2 compatibility
sharding_tolerance: 0.30

# Logging & Monitoring
enable_tensorboard: True
tensorboard_dir: "gs://tinymath-reason-data-himanshu/tensorboard/tinymath-1b-prod-run1"
metrics_dir: "gs://tinymath-reason-data-himanshu/metrics/tinymath-1b-prod-run1"
log_period: 10
